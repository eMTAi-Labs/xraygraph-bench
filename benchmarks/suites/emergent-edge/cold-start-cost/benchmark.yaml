name: cold-start-cost
family: emergent-edge
version: "1.0.0"
tier: B
status: published
query_language: cypher
description: >
  Quantifies the cold-start tax of the emergent edge system. Before the engine
  has observed enough query repetitions to synthesize shortcuts (cold_start_min
  observations + promotion_reuse_min), every query pays full base traversal
  cost. This benchmark measures: (1) total cold-start cost — cumulative latency
  of the first N queries before any optimization kicks in, (2) break-even
  point — after how many total queries does the cumulative time-saved by
  emergent edges exceed the cumulative cold-start cost, (3) amortization
  rate — how quickly the optimization pays for itself.

  This is critical for workloads where the same query runs infrequently.
  If the break-even point is 500 iterations but the query only runs 100 times,
  the emergent edge system adds overhead without net benefit.

citation: >
  xrayGraphDB Emergent Edge Lifecycle patent. Cold start analysis methodology
  inspired by online learning regret bounds — total regret vs. oracle cost.

dataset:
  name: synthetic-deep-traversal
  type: synthetic
  generator: deep_traversal
  generator_params:
    num_roots: 3
    fanout_per_level: [4, 4, 3, 3, 2, 2, 2, 2, 2, 2]
    seed: 42

query_template: >
  MATCH (start:DT {id: $seed_id})-[:E*$hop_depth]->(target)
  RETURN count(target) AS reachable_count

parameters:
  seed_id:
    type: integer
    default: 0
    min: 0
    max: 2
    description: >
      Root node for traversal.
  hop_depth:
    type: integer
    default: 5
    min: 3
    max: 10
    description: >
      Traversal depth. Higher = more expensive base cost = bigger potential
      speedup = longer absolute cold-start cost.
  total_iterations:
    type: integer
    default: 1000
    min: 200
    max: 10000
    description: >
      Total iterations to run. Must be large enough to observe the full
      cold-start period plus sufficient steady-state for amortization.

correctness_oracle:
  type: invariant
  description: >
    All iterations must return the same count. Consistency across the
    cold-start boundary (before and after optimization) is critical.

metrics:
  - cold_ms
  - warm_ms
  - rows_out

tags:
  - emergent-edge
  - tier-b
  - cold-start
  - amortization
  - break-even

warm_runs: 1000
timeout_seconds: 1200

notes: >
  Tier B benchmark — xrayGraphDB only. The runner should capture per-iteration
  latency and compute: (1) cold_start_iterations — iterations before first
  cache hit, (2) cold_start_total_ms — cumulative cost of cold-start period,
  (3) break_even_iteration — iteration where cumulative savings exceed
  cumulative cold-start cost, (4) amortization_factor — total_cost_with_ee /
  total_cost_without_ee over all iterations (< 1.0 = net benefit).

  Run once with emergent edge enabled, once disabled. The difference in
  cumulative latency is the net value of the optimization system.
