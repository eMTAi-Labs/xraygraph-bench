name: learning-curve
family: emergent-edge
version: "1.0.0"
tier: B
status: published
query_language: cypher
description: >
  Measures the emergent edge learning curve — how query latency evolves as the
  engine observes repeated traversal patterns, detects structural shortcuts,
  validates them, and deploys them to the cache. The same deep traversal query
  is executed N times sequentially. The time-series of latencies should show
  distinct phases: (1) first execution at full base cost, (2) Tier 2 session
  cache activation on the second execution (fast-path memoization), (3) a
  transition period as the detect phase identifies structural patterns, (4)
  accelerated execution once Tier 3 materialized shortcuts are deployed.

  For deep traversals (10-hop), the engine uses PROGRESSIVE BOOTSTRAPPING:
  timed-out traversals generate partial observations (frontier sizes, partial
  paths). The detect phase synthesizes incremental shortcuts for reachable
  depths (hops 1-6). On subsequent executions, these shortcuts extend the
  reachable frontier, enabling hops 7-10 to complete. The benchmark should
  capture this bootstrapping effect: a 10-hop query that initially times out
  should eventually complete as the engine learns shortcuts level by level.

  This benchmark REQUIRES the emergent edge engine to be enabled on the target
  engine. On engines without workload-learned optimization, the curve should
  be flat (no learning). The difference between a flat curve and a learning
  curve is itself a benchmark result.

citation: >
  xrayGraphDB Emergent Edge Lifecycle patent (eMTAi LLC, 2026). Workload-learned
  relationship optimization. Learning curve methodology inspired by online
  learning theory — regret bounds for repeated queries.

dataset:
  name: synthetic-deep-traversal
  type: synthetic
  generator: deep_traversal
  generator_params:
    num_roots: 3
    fanout_per_level: [4, 4, 3, 3, 2, 2, 2, 2, 2, 2]
    seed: 42

query_template: >
  MATCH (start:DT {id: $seed_id})-[:E*$hop_depth]->(target)
  RETURN count(target) AS reachable_count

parameters:
  seed_id:
    type: integer
    default: 0
    min: 0
    max: 2
    description: >
      Root node to start traversal from.
  hop_depth:
    type: integer
    default: 5
    min: 1
    max: 10
    description: >
      Traversal depth. Higher values produce more expensive base queries,
      giving the emergent edge engine more room to optimize.
  total_iterations:
    type: integer
    default: 500
    min: 100
    max: 10000
    description: >
      Number of times to execute the same query sequentially.
      Must be large enough to observe the full learning curve.
  measurement_interval:
    type: integer
    default: 1
    min: 1
    max: 10
    description: >
      Record latency every N iterations. Set to 1 for full resolution.

correctness_oracle:
  type: invariant
  description: >
    Every execution must return the same reachable_count (the graph is not
    being modified during the benchmark). If any execution returns a different
    count, the emergent edge cache served stale or incorrect data.

metrics:
  - cold_ms
  - warm_ms
  - compile_ms
  - rows_out
  - cache_hit

tags:
  - emergent-edge
  - tier-b
  - learning-curve
  - time-series
  - optimization

warm_runs: 500
timeout_seconds: 600

notes: >
  Tier B benchmark — xrayGraphDB only. Requires emergent edge engine enabled.
  The runner should capture per-iteration latency as a time series, not just
  summary statistics. Key output metrics: (1) time_to_tier2 — should be
  iteration 2 (fast-path memoization), (2) time_to_tier3 — iteration when
  materialized shortcut deploys, (3) speedup_ratio — base_cost / optimized,
  (4) learning_rate — slope of the transition region.

  CRITICAL TEST — Progressive bootstrapping at hop_depth=10: Run with
  timeout_seconds=30. Initial iterations may timeout. Track whether the
  engine synthesizes incremental shortcuts (hops 1→6) from partial timeout
  observations, enabling later iterations to reach hops 7→10. The benchmark
  PASSES if a 10-hop query that initially timed out eventually completes.
  This is the emergent edge system's "final boss" — turning timeouts into
  cache hits through progressive learning.

  Compare with emergent edge engine disabled to isolate the optimization effect.
